# 这是一个 sample，文件实质完成后删掉这行注释

name: Validate Author Lab Repository

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-repository:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
      - name: Install validation dependencies
        run: python -m pip install -c validation-constraints.txt -e '.[development]'
      - name: Validate repository structure
        run: python repository-automation-scripts/validate_author_lab_repository_structure.py
      - name: Validate JSON and JSONL syntax
        run: python repository-automation-scripts/validate_json_and_jsonl_documents.py
      - name: Validate registered machine-readable contracts
        run: python repository-automation-scripts/validate_machine_readable_contracts.py
      - name: Validate repository cross references
        run: python repository-automation-scripts/validate_repository_cross_references.py
      - name: Validate source research and model provenance
        run: python repository-automation-scripts/validate_source_research_and_model_provenance.py
      - name: Validate canonical policy references
        run: python repository-automation-scripts/validate_policy_rule_references.py
      - name: Validate work-item states
        run: python repository-automation-scripts/validate_writing_work_item_state.py
      - name: Validate writing run reproducibility
        run: python repository-automation-scripts/validate_writing_run_reproducibility.py
      - name: Validate publication integrity
        run: python repository-automation-scripts/validate_publication_integrity.py
      - name: Validate repository placeholders
        shell: bash
        run: |
          set -o pipefail
          python repository-automation-scripts/validate_sample_comment_markers.py \
            | tee "$RUNNER_TEMP/placeholder-validation.log"
      - name: Run Ruff
        shell: bash
        run: |
          set -o pipefail
          ruff check repository-automation-scripts repository-validation-tests \
            --output-format=concise 2>&1 | tee "$RUNNER_TEMP/ruff-validation.log"
      - name: Run repository validation tests
        shell: bash
        run: |
          set -o pipefail
          pytest repository-validation-tests --tb=short 2>&1 \
            | tee "$RUNNER_TEMP/pytest-validation.log"
      - name: Upload validation diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: validation-diagnostics
          path: |
            ${{ runner.temp }}/placeholder-validation.log
            ${{ runner.temp }}/ruff-validation.log
            ${{ runner.temp }}/pytest-validation.log
          if-no-files-found: ignore
